<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Encantos da Nê | Sistema de Crochê</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app">
        <!-- Auth Screen (Initial) -->
        <div id="auth-screen" class="screen">
            <div class="auth-card animate-fade-in">
                <img src="logo.png" alt="Logo" class="auth-logo">
                <h2 id="auth-title">Bem-vinda!</h2>
                <p id="auth-subtitle">Faça login para continuar</p>

                <form id="auth-form">
                    <div class="form-group" id="name-group" class="hidden">
                        <label>Seu Nome</label>
                        <input type="text" id="user-fullname" placeholder="Nome Completo">
                    </div>
                    <div class="form-group">
                        <label>E-mail</label>
                        <input type="email" id="user-email" placeholder="seu@email.com" required>
                    </div>
                    <div class="form-group" id="password-group">
                        <label>Senha</label>
                        <input type="password" id="user-password" placeholder="••••••••" required>
                    </div>
                    <div class="form-group hidden" id="confirm-password-group">
                        <label>Confirmar Senha</label>
                        <input type="password" id="user-confirm-password" placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%"
                        id="auth-submit-btn">Entrar</button>
                </form>

                <div class="auth-actions">
                    <button id="toggle-auth" class="text-btn">Não tem conta? Cadastre-se</button>
                    <button id="forgot-password" class="text-btn">Esqueci a senha</button>
                </div>
                <footer class="auth-footer">
                    <p>&copy; 2026 Encantos da Nê. Todos os direitos reservados.</p>
                    <p class="brand-footer">Powered by <strong>RGF - Finanças Pro</strong></p>
                </footer>
            </div>
        </div>

        <!-- App Screen (After Login) -->
        <div id="app-screen" class="screen hidden">
            <!-- Navigation -->
            <nav class="main-nav" id="app-nav">
                <div class="nav-logo">
                    <img src="logo.png" alt="Encantos da Nê" id="brand-logo">
                    <span>Encantos da Nê</span>
                </div>
                <!-- Nav items will be injected based on role -->
                <div id="nav-container" class="nav-links"></div>
                <button id="logout-btn" class="nav-btn logout">
                    <i data-lucide="log-out"></i>
                    <span>Sair</span>
                </button>
            </nav>

            <!-- Main Content Area -->
            <main id="main-content">
                <!-- Content will be injected here via app.js -->
            </main>

            <footer class="app-footer">
                <p>&copy; 2026 Encantos da Nê. By <strong>RGF - Finanças Pro</strong></p>
            </footer>
        </div>

        <!-- Modals -->
        <div id="modal-container" class="modal-overlay hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modal-title">Novo Item</h2>
                    <button id="close-modal" class="icon-btn"><i data-lucide="x"></i></button>
                </div>
                <div id="modal-body"></div>
            </div>
        </div>

        <!-- Loading Indicator -->
        <div id="loading-overlay" class="hidden">
            <div class="loader"></div>
            <p>Sincronizando...</p>
        </div>

        <!-- Notification container -->
        <div id="notification-container"></div>
    </div>

    <script src="app.js"></script>
</body>

</html>
