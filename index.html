<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Encantos da Nê | Gestão Pessoal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="app">
        <!-- Auth Screen -->
        <div id="auth-screen" class="screen">
            <div class="auth-card animate-fade-in">
                <img src="logo.png" alt="Logo" class="auth-logo">
                <h2 id="auth-title">Encantos da Nê</h2>
                <form id="auth-form">
                    <div class="form-group hidden" id="name-group">
                        <label>Nome</label>
                        <input type="text" id="user-fullname">
                    </div>
                    <div class="form-group">
                        <label>E-mail</label>
                        <input type="email" id="user-email" required>
                    </div>
                    <div class="form-group">
                        <label>Senha</label>
                        <input type="password" id="user-password" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%" id="auth-submit-btn">Entrar</button>
                </form>
                <button id="toggle-auth" class="text-btn">Criar nova conta</button>
            </div>
        </div>

        <!-- Main Screen -->
        <div id="app-screen" class="screen hidden">
            <nav class="main-nav">
                <div class="nav-logo"><img src="logo.png" alt="Logo"><span>Encantos da Nê</span></div>
                <div id="nav-container" class="nav-links"></div>
                <button id="logout-btn" class="nav-btn logout">Sair</button>
            </nav>
            <main id="main-content"></main>
        </div>

        <!-- Modals and Loader -->
        <div id="modal-container" class="modal-overlay hidden">
            <div class="modal-content">
                <div class="modal-header"><h2 id="modal-title"></h2><button id="close-modal">X</button></div>
                <div id="modal-body"></div>
            </div>
        </div>
        <div id="loading-overlay" class="hidden"><div class="loader"></div></div>
    </div>
    <!-- Script com versão manual para forçar atualização -->
    <script src="app.js?v=3.0"></script>
</body>
</html>
