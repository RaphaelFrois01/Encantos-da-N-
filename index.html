<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Encantos da Nê</title>
  <meta name="description" content="Gestão de artesanato e finanças - Encantos da Nê">
  <meta name="theme-color" content="#D68C7A">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <h1>Encantos da Nê</h1>
  </header>

  <!-- Search Bar -->
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Buscar..." class="search-input">
  </div>

  <!-- Main Content Area -->
  <main id="mainContent">

    <!-- Tab: Produtos -->
    <section id="tab-produtos" class="tab-content">
      <div class="section-header">
        <h2>Meus Produtos</h2>
        <button class="btn-add" onclick="openModal('produto')">+ Novo Produto</button>
      </div>
      <div id="listaProdutos" class="item-list"></div>
    </section>

    <!-- Tab: Materiais -->
    <section id="tab-materiais" class="tab-content is-hidden">
      <div class="section-header">
        <h2>Materiais</h2>
        <button class="btn-add" onclick="openModal('material')">+ Novo Material</button>
      </div>
      <div id="listaMateriais" class="item-list"></div>
    </section>

    <!-- Tab: Vendas -->
    <section id="tab-vendas" class="tab-content is-hidden">
      <div class="section-header">
        <h2>Vendas</h2>
        <button class="btn-add" onclick="openModal('venda')">+ Nova Venda</button>
      </div>
      <div id="listaVendas" class="item-list"></div>
    </section>

    <!-- Tab: Financeiro -->
    <section id="tab-financeiro" class="tab-content is-hidden">
      <div class="section-header">
        <h2>Financeiro</h2>
      </div>
      <div id="resumoFinanceiro" class="financeiro-resumo"></div>

      <div class="sub-tabs">
        <button class="sub-tab active" data-subtab="custos-fixos">Custos Fixos</button>
        <button class="sub-tab" data-subtab="entradas">Entradas</button>
        <button class="sub-tab" data-subtab="saidas">Saídas</button>
      </div>

      <div id="subtab-custos-fixos" class="subtab-content">
        <div class="section-header">
          <h3>Custos Fixos</h3>
          <button class="btn-add" onclick="openModal('custoFixo')">+ Novo Custo</button>
        </div>
        <div id="listaCustosFixos" class="item-list"></div>
      </div>
      <div id="subtab-entradas" class="subtab-content is-hidden">
        <div id="listaEntradas" class="item-list"></div>
      </div>
      <div id="subtab-saidas" class="subtab-content is-hidden">
        <div id="listaSaidas" class="item-list"></div>
      </div>
    </section>

    <!-- Tab: Configurações -->
    <section id="tab-config" class="tab-content is-hidden">
      <div class="section-header">
        <h2>Configurações</h2>
      </div>
      <div class="config-options">
        <button class="btn-config" onclick="exportBackup()">📦 Exportar Backup</button>
        <button class="btn-config" onclick="document.getElementById('importFile').click()">📥 Importar Backup</button>
        <input type="file" id="importFile" accept=".json" class="is-hidden" onchange="importBackup(event)">
      </div>
    </section>

  </main>

  <!-- Modal Overlay -->
  <div id="modalOverlay" class="modal-overlay is-hidden">
    <div id="modalContent" class="modal-content"></div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast is-hidden"></div>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-tab="produtos" onclick="navigateTo('produtos')">
      <span class="nav-icon">🎨</span>
      <span class="nav-label">Produtos</span>
    </button>
    <button class="nav-btn" data-tab="materiais" onclick="navigateTo('materiais')">
      <span class="nav-icon">🧵</span>
      <span class="nav-label">Materiais</span>
    </button>
    <button class="nav-btn" data-tab="vendas" onclick="navigateTo('vendas')">
      <span class="nav-icon">🛒</span>
      <span class="nav-label">Vendas</span>
    </button>
    <button class="nav-btn" data-tab="financeiro" onclick="navigateTo('financeiro')">
      <span class="nav-icon">💰</span>
      <span class="nav-label">Financeiro</span>
    </button>
    <button class="nav-btn" data-tab="config" onclick="navigateTo('config')">
      <span class="nav-icon">⚙️</span>
      <span class="nav-label">Config</span>
    </button>
  </nav>

  <!-- Scripts (ordem importa!) -->
  <script src="state.js"></script>
  <script src="render.js"></script>
  <script src="modals.js"></script>
  <script src="handlers.js"></script>

  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(function(err) {
        console.warn('SW registro falhou:', err);
      });
    }
  </script>

</body>
</html>
